services:
  subscription-reminder:
    image: ${SUBSCRIPTION_REMINDER_IMAGE:-ghcr.io/maomao63/subscription-reminder:latest}
    container_name: subscription-reminder
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-13000}:13000"
    environment:
      PORT: "13000"
      CONFIG_DIR: /config
    volumes:
      - "${CONFIG_PATH:-/mnt/user/appdata/subscription-reminder}:/config"
